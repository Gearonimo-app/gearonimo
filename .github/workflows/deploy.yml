name: Deploy apps to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Publieke Supabase-projectgegevens (URL + anon-sleutel): geen geheim,
    # dezelfde waarden komen toch in de gebouwde JS-bundel terecht die
    # iedereen in de browser kan uitlezen. Stonden eerder in gecommitte
    # .env.local-bestanden; die zijn uit git gehaald (security-review
    # 2026-07-18, tegenstrijdig met .gitignore), dus de build-stap heeft ze
    # hier nodig. Wijzigt dit ooit (nieuw Supabase-project) dan hier
    # aanpassen, niet opnieuw een .env.local committen.
    env:
      VITE_SUPABASE_URL: https://buitfeiclivzzldfdelp.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1aXRmZWljbGl2enpsZGZkZWxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjM1MjMsImV4cCI6MjA5Njk5OTUyM30.hqxwKwak8ihVwMWDOaeOxdJhkUJi19GCflK5c38SvcY
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: cd apps/inspector && npx vite build
      # Klant-app (fase 3) op hetzelfde domein onder /portal/ (hash-router,
      # dus geen eigen 404-fallback nodig). Ná de inspector-build kopiëren,
      # zodat de klant-app niet in de precache van de inspector-service-
      # worker belandt (die shell moet licht blijven, zie vite.config).
      - run: cd apps/customer && npx vite build
      - run: mkdir -p apps/inspector/dist/portal && cp -r apps/customer/dist/. apps/inspector/dist/portal/
      # Oude pad /klant/ (vóór de Engelstalige hernoeming 2026-07-03) blijft
      # doorverwijzen; location.replace behoudt de #-hash, zodat ook een oude
      # magic-link met auth-tokens nog goed landt.
      - run: |
          mkdir -p apps/inspector/dist/klant
          cat > apps/inspector/dist/klant/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Gearonimo</title>
          <script>location.replace('/portal/' + location.hash);</script>
          HTML
      # SPA-fallback: deeplinks (bv. /customers) terug naar index.html
      - run: cp apps/inspector/dist/index.html apps/inspector/dist/404.html
      # Eigen domein vasthouden
      - run: echo 'gearonimo.net' > apps/inspector/dist/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/inspector/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
